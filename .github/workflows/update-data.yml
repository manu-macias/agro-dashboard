name: Actualizar precios diarios

# Corre todos los días y commitea data/precios.json con el dólar MEP y la
# pizarra de soja del día. El script es portable: también podés correrlo con
# un cron en cualquier servidor (node scripts/update-data.mjs).
on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC ≈ 19:00 ART, con pizarra ya cerrada
  workflow_dispatch:        # permite dispararlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Actualizar precios
        run: node scripts/update-data.mjs

      - name: Commitear si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/precios.json; then
            git add data/precios.json
            git commit -m "datos: actualiza precios diarios ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sin cambios en data/precios.json"
          fi
