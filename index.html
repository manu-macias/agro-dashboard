function calcScore(v) {
  const { soja_hoy, dolar_hoy, soja_prom, dolar_prom, stock_d, stock_s, urgencia, expect_s } = v;
  if (!soja_hoy || !dolar_hoy || !soja_prom || !dolar_prom) return { score:0, soja_rel:0, dolar_rel:0, razones:[] };
  const soja_rel  = (soja_hoy  - soja_prom)  / soja_prom;
  const dolar_rel = (dolar_hoy - dolar_prom) / dolar_prom;
  let score = 0; const razones = [];
  score += soja_rel * 3.5;
  if (soja_rel > 0.02)       razones.push({ c:"green",  t:`Soja ${PCT(soja_rel)} sobre su promedio`,  d:"buen momento para liquidar" });
  else if (soja_rel < -0.02) razones.push({ c:"red",    t:`Soja ${PCT(soja_rel)} bajo su promedio`,   d:"conviene guardarla" });
  score -= dolar_rel * 2.5;
  if (dolar_rel > 0.02)       razones.push({ c:"green",  t:`Dólar ${PCT(dolar_rel)} sobre su promedio`, d:"buen momento para vender dólares" });
  else if (dolar_rel < -0.02) razones.push({ c:"red",    t:`Dólar ${PCT(dolar_rel)} bajo su promedio`,  d:"guardá los dólares" });
  score -= (stock_d - 3) * 0.35;
  if (stock_d >= 4) razones.push({ c:"blue",   t:"Buen stock de dólares", d:"podés vender sin quedar descubierto" });
  if (stock_d <= 2) razones.push({ c:"yellow", t:"Poco stock de dólares", d:"cuidado con vender muchos" });
  score += (stock_s - 3) * 0.25;
  if (stock_s >= 4) razones.push({ c:"green",  t:"Mucha soja en stock", d:"podés vender sin apuro" });
  score -= (expect_s - 3) * 0.6;
  if (expect_s >= 4) razones.push({ c:"blue",   t:"Esperás que suba la soja", d:"guardala y vendé dólares ahora" });
  if (expect_s <= 2) razones.push({ c:"yellow", t:"Esperás que baje la soja", d:"mejor vender ahora que después" });
  if (urgencia >= 4) razones.push({ c:"gray",   t:"Alta urgencia de pesos", d:"actuá rápido con lo que esté mejor" });
  return { score, soja_rel, dolar_rel, razones };
}

function SecLabel({ children }) {
  return h("div", { style:{ fontSize:12, fontWeight:600, color:T.text3, margin:"18px 2px 9px" } }, children);
}

function Slider({ label, value, onChange, hint }) {
  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.rs, padding:"12px 13px" } },
    h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12.5, fontWeight:500, color:T.text2, marginBottom:9 } },
      h("span", null, label), h("span", { style:{ color:T.soja, fontWeight:700, fontSize:15 } }, value)
    ),
    h("input", { type:"range", min:1, max:5, value, onChange: e => onChange(Number(e.target.value)) }),
    h("div", { style:{ fontSize:11, color:T.faint, marginTop:6 } }, hint)
  );
}

function NumInput({ label, value, onChange, unit, step, icon, accent }) {
  const st = step || 1000;
  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.rs, padding:"12px 13px" } },
    h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12, fontWeight:500, color:T.text3, marginBottom:7 } },
      icon ? ic(icon, 15, accent || T.text3) : null, h("span", null, label)
    ),
    h("input", { type:"number", value, step:st, onChange: e => onChange(Number(e.target.value)),
      style:{ width:"100%", background:"transparent", border:"none", outline:"none", color:T.text, fontSize:20, fontWeight:700, fontFamily:"inherit", marginBottom:7 } }),
    h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 } },
      h("div", { style:{ fontSize:11, color:T.faint, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" } }, unit),
      h("div", { style:{ display:"flex", gap:6, flexShrink:0 } },
        stepBtn("minus", () => onChange(Number((value - st).toFixed(2)))),
        stepBtn("plus",  () => onChange(Number((value + st).toFixed(2))))
      )
    )
  );
}

function PriceChart({ precios }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !precios.length) return;
    if (chartRef.current) chartRef.current.destroy();

    const daily  = precios.some(p => p.fecha);
    const labels = precios.map(p => p.fecha ? p.fecha.slice(8,10) + "/" + p.fecha.slice(5,7) : p.mes);
    const sojas  = precios.map(p => p.soja);
    const dolars = precios.map(p => p.dolar);
    const last   = precios.length - 1;
    const lastSoja = sojas.reduce((acc, v, i) => v != null ? i : acc, -1);

    chartRef.current = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Soja $/tn",
            data: sojas,
            yAxisID: "ySoja",
            borderColor: T.soja,
            backgroundColor: "rgba(166,214,63,0.09)",
            borderWidth: 2.5,
            pointRadius: sojas.map((_, i) => i === lastSoja ? 5 : (daily ? 0 : 3)),
            pointBackgroundColor: sojas.map((_, i) => i === lastSoja ? T.soja : "rgba(166,214,63,0.5)"),
            pointBorderColor: "transparent",
            tension: daily ? 0.1 : 0.35,
            spanGaps: true,
            fill: !daily,
          },
          {
            label: "Dólar $/USD",
            data: dolars,
            yAxisID: "yDolar",
            borderColor: T.dolar,
            backgroundColor: "rgba(232,169,44,0.06)",
            borderWidth: 2.5,
            pointRadius: dolars.map((_, i) => i === last ? 5 : (daily ? 0 : 3)),
            pointBackgroundColor: dolars.map((_, i) => i === last ? T.dolar : "rgba(232,169,44,0.5)"),
            pointBorderColor: "transparent",
            tension: daily ? 0.1 : 0.35,
            spanGaps: true,
            fill: !daily,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: T.text2, font: { size: 11, family: "Inter" }, boxWidth: 12, padding: 16 } },
          tooltip: {
            backgroundColor: T.surface2, borderColor: T.border, borderWidth: 1,
            titleColor: T.text, bodyColor: T.text2, padding: 10,
            titleFont: { family:"Inter" }, bodyFont: { family:"Inter" },
            callbacks: { label: ctx => "  " + ctx.dataset.label + ": $" + FMT(ctx.parsed.y) },
          },
        },
        scales: {
          x: { ticks: { color: T.faint, font: { size: 10, family:"Inter" }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { color: "rgba(46,42,32,0.7)" } },
          ySoja:  { position: "left",  ticks: { color: T.soja,  font: { size: 10, family:"Inter" }, callback: v => "$" + (v/1000).toFixed(0) + "k" }, grid: { color: "rgba(46,42,32,0.7)" } },
          yDolar: { position: "right", ticks: { color: T.dolar, font: { size: 10, family:"Inter" }, callback: v => "$" + (v/1000).toFixed(1) + "k" }, grid: { drawOnChartArea: false } },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [precios]);

  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.r, padding:"16px 13px", marginBottom:14 } },
    h("div", { style:{ display:"flex", alignItems:"center", gap:8, fontSize:12.5, fontWeight:600, color:T.text2, marginBottom:13 } },
      ic("chart-line", 16, T.soja), h("span", null, "Evolución diaria"),
      h("span", { style:{ fontSize:11, fontWeight:400, color:T.faint } }, "· pasá el dedo para ver valores")
    ),
    h("canvas", { ref: canvasRef, style:{ maxHeight: 260 } })
  );
}

  });

  useEffect(() => {

        }));

  const set = (k) => (val) => setV(prev => ({ ...prev, [k]: val }));

  const { score, soja_rel, dolar_rel, razones } = calcScore(v);
  const claro = Math.abs(score) > 1.2;
  let verdict = { title:"Situación neutral", sub:"Los precios están cerca de los promedios.", cls:"neutro" };
  if (score > 0.3)  verdict = { title: claro?"¡Vendé soja!":"Leve ventaja: vender soja",       sub: claro?"La soja está sobre su promedio. Buen momento para liquidar."          :"Pequeña ventaja de vender soja.", cls:"soja" };
  if (score < -0.3) verdict = { title: claro?"¡Vendé dólares!":"Leve ventaja: vender dólares", sub: claro?"El dólar está caro vs promedio. Guardá la soja y liquidá dólares." :"Pequeña ventaja de vender dólares.", cls:"dolares" };
  const vt = tint[verdict.cls];

  const pct = Math.max(5, Math.min(95, 50 + score * 18));
  const sojaPs = v.tn_soja * v.soja_hoy, dolarPs = v.usd_dolar * v.dolar_hoy;

    dolares: { fg:T.dolar, lbl:"Dólares" },

    ),
    h(SecLabel, null, "Promedios de referencia (últimos 3 meses)"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Soja promedio",  value:v.soja_prom,  onChange:set("soja_prom"),  unit:"$/tn",  step:1000 }),
      h(NumInput, { label:"Dólar promedio", value:v.dolar_prom, onChange:set("dolar_prom"), unit:"$/USD", step:10   })
    ),
    h("div", { style:{ background:vt.bg, border:`1px solid ${vt.border}`, borderRadius:T.r, padding:"17px 16px", margin:"16px 0" } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:14 } },
        h("div", { style:{ width:54, height:54, flexShrink:0, borderRadius:15, background:vt.bg, border:`1px solid ${vt.border}`, display:"flex", alignItems:"center", justifyContent:"center" } }, ic(vt.icon, 27, vt.fg)),
        h("div", null,
          h("div", { style:{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" } },
            h("span", { style:{ fontSize:21, fontWeight:800, color:T.text, letterSpacing:"-0.02em" } }, verdict.title),
            claro ? h("span", { style:{ fontSize:11, fontWeight:600, color:T.bg, background:vt.fg, borderRadius:6, padding:"2px 7px" } }, "señal fuerte") : null
          ),
          h("div", { style:{ fontSize:13, color:T.text3, lineHeight:1.45, marginTop:3 } }, verdict.sub)
        )

    ),

    h(SecLabel, null, "Mi stock disponible"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Stock de dólares", value:v.stock_d, onChange:set("stock_d"), hint:"1 = pocos · 5 = de sobra" }),
      h(Slider, { label:"Stock de soja",    value:v.stock_s, onChange:set("stock_s"), hint:"1 = poca · 5 = mucha" })
    ),
    h(SecLabel, null, "Mi contexto"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Urgencia de pesos", value:v.urgencia, onChange:set("urgencia"), hint:"1 = tengo tiempo · 5 = ya" }),
      h(Slider, { label:"Expectativa soja",  value:v.expect_s, onChange:set("expect_s"), hint:"1 = va a bajar · 5 = a subir" })
    ),
    h(SecLabel, null, "Cuánto necesito liquidar"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Tn de soja a vender", value:v.tn_soja,   onChange:set("tn_soja"),   unit:"toneladas", step:10, icon:"plant-2", accent:T.soja  }),
      h(NumInput, { label:"USD a vender",         value:v.usd_dolar, onChange:set("usd_dolar"), unit:"dólares",   step:500, icon:"currency-dollar", accent:T.dolar })
    ),
    h("div", { style:{ ...S.card, marginTop:12 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12, fontWeight:600, color:T.text2, marginBottom:12 } }, ic("cash", 15, T.soja), h("span", null, "Equivalencia en pesos")),
      h("div", { style: S.grid2 },
        h("div", null,
          h("div", { style:{ fontSize:11.5, color:T.text3, marginBottom:4 } }, "Si vendés soja"),
          h("div", { style:{ fontSize:21, fontWeight:700, color:T.soja } }, "$"+FMT(sojaPs)),
          h("div", { style:{ fontSize:11, color:T.faint, marginTop:2 } }, v.tn_soja+" tn × $"+FMT(v.soja_hoy)+"/tn")
        ),
        h("div", null,
          h("div", { style:{ fontSize:11.5, color:T.text3, marginBottom:4 } }, "Si vendés dólares"),
          h("div", { style:{ fontSize:21, fontWeight:700, color:T.dolar } }, "$"+FMT(dolarPs)),
          h("div", { style:{ fontSize:11, color:T.faint, marginTop:2 } }, FMT(v.usd_dolar)+" USD × $"+FMT(v.dolar_hoy))
        )
      ),
      h("div", { style:{ marginTop:13, paddingTop:11, borderTop:`1px solid ${T.border}`, fontSize:12.5, color:T.text3 } },
        "Diferencia: ",
        h("span", { style:{ color: sojaPs>dolarPs?T.soja:T.dolar, fontWeight:700 } }, "$"+FMT(Math.abs(sojaPs-dolarPs))),
        " a favor de "+(sojaPs>dolarPs?"vender soja":"vender dólares")
      )
    )
  );

  const subVentas = h("div", null,
    h("div", { style:{ fontSize:11.5, color:T.text3, marginBottom:11, lineHeight:1.6 } },
      "Campaña 2026-2027 · Precio actual $"+FMT(precioAct)+"/tn · ",
      h("span", { style:{ color:T.score } }, "Demo — en producción conectado a Google Sheets en vivo")
    ),
    h("div", { style:{ overflowX:"auto" } },
      h("table", { style:{ width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          h("th", { style:{ ...thS, textAlign:"left" } }, "Socio"),
          h("th", { style: thS }, "Stock"),
          ...MESES_CAMP.map((m,i) => h("th", { key:i, style: thS }, m)),
          h("th", { style:{ ...thS, color:T.score } }, "Resto")
        )),
        h("tbody", null,
          ...ventas.map((r,ri) => h("tr", { key:ri },
            h("td", { style: tdN }, r.nombre),
            h("td", { style: tdS }, r.stock),
            ...r.ventas.map((v2,mi) => h("td", { key:mi, style:{ ...tdS, color: v2>0?T.soja:T.faint } }, v2>0?v2:"—")),
            h("td", { style:{ ...tdS, color:T.score, fontWeight:700 } }, r.resto)
          )),
          h("tr", null,
            h("td", { style:{ ...tdN, borderTop:`1px solid ${T.borderStrong}` } }, "TOTAL"),
            h("td", { style:{ ...tdS, fontWeight:700, color:T.text, borderTop:`1px solid ${T.borderStrong}` } }, totalRow.stock),
            ...totalRow.ventas.map((v2,mi) => h("td", { key:mi, style:{ ...tdS, fontWeight:700, color: v2>0?T.soja:T.faint, borderTop:`1px solid ${T.borderStrong}` } }, v2>0?v2:"—")),
            h("td", { style:{ ...tdS, fontWeight:700, color:T.score, borderTop:`1px solid ${T.borderStrong}` } }, totalRow.resto)
          )
        )
      )
    ),
    h("div", { style:{ marginTop:12, padding:"11px 13px", background:T.sojaBg, border:`1px solid ${T.sojaBorder}`, borderRadius:T.rs, fontSize:12, color:T.text2 } },
      "Total vendido: ", h("span", { style:{ color:T.soja, fontWeight:700 } }, totVend+" tn"),
      "  ·  Facturación: ", h("span", { style:{ color:T.soja, fontWeight:700 } }, "$"+FMT(totVend*precioAct)),
      "  ·  Resto: ", h("span", { style:{ color:T.score, fontWeight:700 } }, totalRow.resto+" tn")
    )
  );

  const subPrecios = h("div", null,
    h(PriceChart, { precios: priceHist.length ? priceHist : precios }),
    h("div", { style:{ overflowX:"auto" } },
      h("table", { style:{ width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          ...["Mes","Dólar oficial","Soja $/tn"].map((lbl,i) =>
            h("th", { key:i, style:{ ...thS, textAlign: i===0?"left":"right" } }, lbl)
          )
        )),
        h("tbody", null,
          ...[...precios].reverse().map((row,ri) => {
            const ia = row.mes===mesAct;
            return h("tr", { key:ri, style: ia?{ background:T.sojaBg }:{} },
              h("td", { style:{ ...tdN, color: ia?T.soja:T.text2 } }, row.mes+(ia?"  ◀":"")),
              h("td", { style:{ ...tdS, color: ia?T.dolar:T.text2 } }, "$"+FMT(row.dolar)),
              h("td", { style:{ ...tdS, color: ia?T.soja:T.text2 } }, "$"+FMT(row.soja))
            );
          })
        )
      )
    )
  );

  const subRegistros = h("div", null,
    h("div", { style:{ ...S.grid2, marginBottom:9 } },
      ...[
        { lbl:"Mes", key:"mes", type:"text", placeholder:"Jun 2026" },
        { lbl:"Soja $/tn", key:"soja", type:"number" },
        { lbl:"Dólar $/USD", key:"dolar", type:"number" },
      ].map(f => h("div", { key:f.key, style: S.card },
        h("div", { style:{ fontSize:11.5, fontWeight:500, color:T.text3, marginBottom:6 } }, f.lbl),
        h("input", { type:f.type||"text", value:hForm[f.key], placeholder:f.placeholder||"",
          onChange: e => setHForm(p => ({ ...p, [f.key]: e.target.value })),
          style:{ width:"100%", background:"transparent", border:"none", outline:"none", color:T.text, fontSize:15, fontWeight:600, fontFamily:"inherit" } })
      )),
      h("div", { style: S.card },
        h("div", { style:{ fontSize:11.5, fontWeight:500, color:T.text3, marginBottom:6 } }, "Decisión"),
        h("select", { value:hForm.decision, onChange: e => setHForm(p => ({ ...p, decision: e.target.value })),
          style:{ background:"transparent", border:"none", outline:"none", color:T.text, fontSize:14, fontWeight:600, fontFamily:"inherit", width:"100%", cursor:"pointer" } },
          h("option", { value:"soja" }, "Soja"),
          h("option", { value:"dolares" }, "Dólares"),
          h("option", { value:"mixto" }, "Mixto")
        )
      )
    ),
    h("button", {
      onClick: () => {
        if (!hForm.mes || !hForm.soja || !hForm.dolar) return;
        saveHist([...hist, { ...hForm, fecha: Date.now() }]);
        setHForm({ mes:"", soja:"", dolar:"", decision:"soja" });
      },
      style:{ width:"100%", padding:12, background:T.soja, border:"none", borderRadius:T.rs, color:T.bg, fontSize:14, fontWeight:700, cursor:"pointer", marginBottom:14, display:"flex", alignItems:"center", justifyContent:"center", gap:7 }
    }, ic("plus", 17), "Agregar registro"),
    hist.length===0
      ? h("div", { style:{ textAlign:"center", color:T.text3, fontSize:13, padding:"30px 16px", border:`1px dashed ${T.border}`, borderRadius:T.rs } }, "Sin registros todavía.")
      : h("div", { style:{ overflowX:"auto" } },
          h("table", { style:{ width:"100%", borderCollapse:"collapse", fontSize:13 } },
            h("thead", null, h("tr", null,
              ...["Mes","Soja","Dólar","Decisión",""].map((lbl,i) =>
                h("th", { key:i, style:{ ...thS, textAlign: i===0?"left":"right" } }, lbl)
              )
            )),
            h("tbody", null,
              ...[...hist].reverse().map((row,ri) => {
                const realIdx = hist.length-1-ri;
                const bc = DC[row.decision]||DC.mixto;
                return h("tr", { key:ri },
                  h("td", { style:{ ...tdN, textAlign:"left", fontWeight:500 } }, row.mes),
                  h("td", { style: tdS }, "$"+FMT(row.soja)),
                  h("td", { style: tdS }, "$"+FMT(row.dolar)),
                  h("td", { style:{ padding:"8px", borderBottom:`1px solid ${T.surface2}` } },
                    h("span", { style:{ display:"inline-block", padding:"2px 9px", borderRadius:6, fontSize:11, fontWeight:600, background:T.surface2, color:bc.fg, border:`1px solid ${T.border}` } }, bc.lbl)
                  ),
                  h("td", { style:{ padding:"8px", textAlign:"right", borderBottom:`1px solid ${T.surface2}` } },
                    h("button", { onClick: () => saveHist(hist.filter((_,i) => i!==realIdx)), "aria-label":"borrar",
                      style:{ background:"none", border:"none", color:T.text3, cursor:"pointer", display:"inline-flex" } }, ic("x", 15))
                  )
                );
              })
            )
          )
        )
  );

  const HIST_SUBS = [ { icon:"box", label:"Ventas" }, { icon:"chart-line", label:"Precios" }, { icon:"pencil", label:"Registros" } ];
  const tabHistorial = h("div", null,
    h("div", { style:{ display:"flex", gap:5, background:T.segBg, border:`1px solid ${T.border}`, borderRadius:11, padding:4, marginBottom:14 } },
      ...HIST_SUBS.map((t,i) =>
        h("button", { key:i, onClick: () => setHistSub(i),
          style:{ flex:1, padding:"9px 4px", borderRadius:8, border:"none", background: histSub===i?T.surface2:"transparent", color: histSub===i?T.soja:T.text3, fontSize:12.5, fontWeight: histSub===i?600:500, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 } },
          ic(t.icon, 15), t.label
        )
      )
    ),
    histSub===0 ? subVentas : histSub===1 ? subPrecios : subRegistros
  );

  return h("div", { style: S.page },
    h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:11 } },
        h("div", { style:{ width:40, height:40, borderRadius:12, background:T.sojaBg, border:`1px solid ${T.sojaBorder}`, display:"flex", alignItems:"center", justifyContent:"center" } }, ic("plant-2", 22, T.soja)),
        h("div", null,
          h("div", { style:{ fontSize:17, fontWeight:700, color:T.text, letterSpacing:"-0.01em" } }, "Agro Dashboard"),
          h("div", { style:{ fontSize:11.5, color:T.text3, marginTop:1 } }, "Soja vs dólar · datos diarios")
        )
      ),
      h("span", { style:{ display:"flex", alignItems:"center", gap:5, fontSize:11, fontWeight:600, color:T.score, background:T.scoreBg, border:`1px solid ${T.scoreBorder}`, borderRadius:7, padding:"4px 9px" } }, ic("flask", 13), "DEMO")
    ),
    h("div", { style:{ display:"flex", gap:5, background:T.segBg, border:`1px solid ${T.border}`, borderRadius:12, padding:4, marginBottom:16 } },
      ...TABS.map((t,i) =>
        h("button", { key:i, onClick: () => setTab(i),
          style:{ flex:1, padding:"10px 4px", borderRadius:9, border:"none", background: tab===i?T.surface2:"transparent", color: tab===i?T.text:T.text3, fontSize:12.5, fontWeight: tab===i?600:500, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 } },
          ic(t.icon, 16, tab===i?T.soja:T.text3), h("span", null, t.label)
        )
      )
    ),
    tab===0 ? tabDecision : tab===1 ? tabSituacion : tabHistorial
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
