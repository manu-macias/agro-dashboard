const FMT = (n) => Number(n).toLocaleString("es-AR", { maximumFractionDigits: 0 });
const PCT = (v) => (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";

const MESES_CAMP = ["JUN","JUL","AGO","SEP","OCT","NOV","DIC","ENE","FEB","MAR","ABR","MAY"];

// Demo data — in production, fetched live from a private Google Sheet via Google Apps Script API

  ],
};

function calcScore(v) {
  const { soja_hoy, dolar_hoy, soja_prom, dolar_prom, stock_d, stock_s, urgencia, expect_s } = v;
  if (!soja_hoy || !dolar_hoy || !soja_prom || !dolar_prom) return { score:0, soja_rel:0, dolar_rel:0, razones:[] };
  const soja_rel  = (soja_hoy  - soja_prom)  / soja_prom;
  const dolar_rel = (dolar_hoy - dolar_prom) / dolar_prom;
  let score = 0; const razones = [];
  score += soja_rel * 3.5;
  if (soja_rel > 0.02)       razones.push({ e:"✅", t:`Soja ${PCT(soja_rel)} sobre su promedio`,  c:"green",  d:"→ buen momento para liquidar" });
  else if (soja_rel < -0.02) razones.push({ e:"⚠️", t:`Soja ${PCT(soja_rel)} bajo su promedio`,   c:"red",    d:"→ conviene guardarla" });
  score -= dolar_rel * 2.5;
  if (dolar_rel > 0.02)       razones.push({ e:"💵", t:`Dólar ${PCT(dolar_rel)} sobre su promedio`, c:"green",  d:"→ buen momento para vender dólares" });
  else if (dolar_rel < -0.02) razones.push({ e:"💵", t:`Dólar ${PCT(dolar_rel)} bajo su promedio`,  c:"red",    d:"→ guardá los dólares" });
  score -= (stock_d - 3) * 0.35;
  if (stock_d >= 4) razones.push({ e:"💼", t:"Buen stock de dólares", c:"blue",   d:"→ podés vender sin quedar descubierto" });
  if (stock_d <= 2) razones.push({ e:"⚠️", t:"Poco stock de dólares", c:"yellow", d:"→ cuidado con vender muchos" });
  score += (stock_s - 3) * 0.25;
  if (stock_s >= 4) razones.push({ e:"🌾", t:"Mucha soja en stock",       c:"green",  d:"→ podés vender sin apuro" });
  score -= (expect_s - 3) * 0.6;
  if (expect_s >= 4) razones.push({ e:"📈", t:"Esperás que suba la soja", c:"blue",   d:"→ guardala y vendé dólares ahora" });
  if (expect_s <= 2) razones.push({ e:"📉", t:"Esperás que baje la soja", c:"yellow", d:"→ mejor vender ahora que después" });
  if (urgencia >= 4) razones.push({ e:"⏰", t:"Alta urgencia de pesos",   c:"gray",   d:"→ actuá rápido con lo que esté mejor" });
  return { score, soja_rel, dolar_rel, razones };
}

function Slider({ label, value, onChange, hint }) {
  return h("div", { style: { background:"#141722", border:"1px solid #1e2130", borderRadius:9, padding:"10px 12px" } },
    h("div", { style: { display:"flex", justifyContent:"space-between", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:8 } },
      h("span", null, label), h("span", { style: { color:"#7a9fff" } }, value)
    ),
    h("input", { type:"range", min:1, max:5, value, onChange: e => onChange(Number(e.target.value)) }),
    h("div", { style: { fontSize:10, color:"#2e3650", marginTop:4 } }, hint)
  );
}

function NumInput({ label, value, onChange, unit, step }) {
  return h("div", { style: { background:"#141722", border:"1px solid #1e2130", borderRadius:9, padding:"10px 12px" } },
    h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:5 } }, label),
    h("input", { type:"number", value, step:step||1000, onChange: e => onChange(Number(e.target.value)),
      style: { width:"100%", background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:17, fontWeight:700, fontFamily:"inherit" } }),
    h("div", { style: { fontSize:10, color:"#2e3650", marginTop:2 } }, unit)
  );
}

function PriceChart({ precios }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !precios.length) return;
    if (chartRef.current) chartRef.current.destroy();

    const labels = precios.map(p => p.mes);
    const sojas  = precios.map(p => p.soja);
    const dolars = precios.map(p => p.dolar);
    const last   = precios.length - 1;

    chartRef.current = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Soja $/tn",
            data: sojas,
            yAxisID: "ySoja",
            borderColor: "#22c55e",
            backgroundColor: "rgba(34,197,94,0.08)",
            borderWidth: 2.5,
            pointRadius: sojas.map((_, i) => i === last ? 5 : 3),
            pointBackgroundColor: sojas.map((_, i) => i === last ? "#22c55e" : "rgba(34,197,94,0.5)"),
            pointBorderColor: "transparent",
            tension: 0.35,
            fill: true,
          },
          {
            label: "Dólar $/USD",
            data: dolars,
            yAxisID: "yDolar",
            borderColor: "#eab308",
            backgroundColor: "rgba(234,179,8,0.06)",
            borderWidth: 2.5,
            pointRadius: dolars.map((_, i) => i === last ? 5 : 3),
            pointBackgroundColor: dolars.map((_, i) => i === last ? "#eab308" : "rgba(234,179,8,0.5)"),
            pointBorderColor: "transparent",
            tension: 0.35,
            fill: true,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: {
            labels: { color: "#8a9ab8", font: { size: 11 }, boxWidth: 12, padding: 16 },
          },
          tooltip: {
            backgroundColor: "#141722",
            borderColor: "#1e2130",
            borderWidth: 1,
            titleColor: "#e8edf5",
            bodyColor: "#8a9ab8",
            padding: 10,
            callbacks: {
              label: ctx => "  " + ctx.dataset.label + ": $" + FMT(ctx.parsed.y),
            },
          },
        },
        scales: {
          x: {
            ticks: { color: "#4a5568", font: { size: 10 }, maxRotation: 45 },
            grid: { color: "rgba(30,33,48,0.8)" },
          },
          ySoja: {
            position: "left",
            ticks: {
              color: "#22c55e",
              font: { size: 10 },
              callback: v => "$" + (v / 1000).toFixed(0) + "k",
            },
            grid: { color: "rgba(30,33,48,0.8)" },
          },
          yDolar: {
            position: "right",
            ticks: {
              color: "#eab308",
              font: { size: 10 },
              callback: v => "$" + (v / 1000).toFixed(1) + "k",
            },
            grid: { drawOnChartArea: false },
          },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [precios]);

  return h("div", { style: { background: "#141722", border: "1px solid #1e2130", borderRadius: 12, padding: "16px 12px", marginBottom: 16 } },
    h("div", { style: { fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#3a4460", marginBottom: 12 } },
      "📈 Evolución histórica — tocá cualquier mes para ver valores"
    ),
    h("canvas", { ref: canvasRef, style: { maxHeight: 260 } })
  );
}

  const vc  = { soja:{ bg:"#0b1f11", border:"#22c55e", title:"#22c55e" }, dolares:{ bg:"#1a1600", border:"#eab308", title:"#eab308" }, neutro:{ bg:"#0e1225", border:"#3b5bdb", title:"#7a9fff" } }[verdict.cls];
  const pct = Math.max(5, Math.min(95, 50 + score * 18));

      h("div", { style: { fontSize:36, marginBottom:6 } }, verdict.emoji),

      h("span", { style: { color:"#3b5bdb" } }, "Demo — en producción conectado a Google Sheets en tiempo real")
    ),
    h("div", { style: { overflowX:"auto" } },
      h("table", { style: { width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          h("th", { style: { ...thS, textAlign:"left" } }, "Socio"),
          h("th", { style: thS }, "Stock"),
          ...MESES_CAMP.map((m,i) => h("th", { key:i, style: thS }, m)),
          h("th", { style: { ...thS, color:"#7a9fff" } }, "Resto")
        )),
        h("tbody", null,
          ...ventas.map((r,ri) => h("tr", { key:ri },
            h("td", { style: tdN }, r.nombre),
            h("td", { style: tdS }, r.stock),
            ...r.ventas.map((v2,mi) => h("td", { key:mi, style: { ...tdS, color: v2>0?"#22c55e":"#2e3650" } }, v2>0?v2:"—")),
            h("td", { style: { ...tdS, color:"#7a9fff", fontWeight:700 } }, r.resto)
          )),
          h("tr", null,
            h("td", { style: { ...tdN, color:"#e8edf5", borderTop:"1px solid #3a4460" } }, "TOTAL"),
            h("td", { style: { ...tdS, fontWeight:700, color:"#e8edf5", borderTop:"1px solid #3a4460" } }, totalRow.stock),
            ...totalRow.ventas.map((v2,mi) => h("td", { key:mi, style: { ...tdS, fontWeight:700, color: v2>0?"#22c55e":"#2e3650", borderTop:"1px solid #3a4460" } }, v2>0?v2:"—")),
            h("td", { style: { ...tdS, fontWeight:700, color:"#7a9fff", borderTop:"1px solid #3a4460" } }, totalRow.resto)
          )
        )
      )
    ),
    h("div", { style: { marginTop:12, padding:"10px 12px", background:"#0b1f11", border:"1px solid #1e3322", borderRadius:8, fontSize:11, color:"#4a7a5a" } },
      "🌾 Total vendido: ", h("span", { style: { color:"#22c55e", fontWeight:700 } }, totVend+" tn"),
      "  ·  Facturación: ", h("span", { style: { color:"#22c55e", fontWeight:700 } }, "$"+FMT(totVend*precioAct)),
      "  ·  Resto campaña: ", h("span", { style: { color:"#7a9fff", fontWeight:700 } }, totalRow.resto+" tn")
    )
  );

  const subPrecios = h("div", null,
    h(PriceChart, { precios }),
    h("div", { style: { overflowX:"auto" } },
      h("table", { style: { width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          ...["Mes","Dólar Blue","Soja $/tn"].map((lbl,i) =>
            h("th", { key:i, style: { ...thS, textAlign: i===0?"left":"right" } }, lbl)
          )
        )),
        h("tbody", null,
          ...[...precios].reverse().map((row,ri) => {
            const ia = row.mes===mesAct;
            return h("tr", { key:ri, style: ia?{ background:"#0e1a0e" }:{} },
              h("td", { style: { ...tdN, color: ia?"#22c55e":"#8a9ab8" } }, row.mes+(ia?" ◀":"")),
              h("td", { style: { ...tdS, color: ia?"#eab308":"#8a9ab8" } }, "$"+FMT(row.dolar)),
              h("td", { style: { ...tdS, color: ia?"#22c55e":"#8a9ab8" } }, "$"+FMT(row.soja))
            );
          })
        )
      )
    )
  );

  const subRegistros = h("div", null,
    h("div", { style: { ...S.grid2, marginBottom:8 } },
      ...[
        { lbl:"Mes", key:"mes", type:"text", placeholder:"Jun 2026" },
        { lbl:"Soja $/tn", key:"soja", type:"number" },
        { lbl:"Dólar $/USD", key:"dolar", type:"number" },
      ].map(f => h("div", { key:f.key, style: S.card },
        h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:5 } }, f.lbl),
        h("input", { type:f.type||"text", value:hForm[f.key], placeholder:f.placeholder||"",
          onChange: e => setHForm(p => ({ ...p, [f.key]: e.target.value })),
          style: { width:"100%", background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:15, fontWeight:600, fontFamily:"inherit" } })
      )),
      h("div", { style: S.card },
        h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:5 } }, "Decisión"),
        h("select", { value:hForm.decision, onChange: e => setHForm(p => ({ ...p, decision: e.target.value })),
          style: { background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:13, fontWeight:600, fontFamily:"inherit", width:"100%", cursor:"pointer" } },
          h("option", { value:"soja" }, "🌾 Soja"),
          h("option", { value:"dolares" }, "💵 Dólares"),
          h("option", { value:"mixto" }, "⚖️ Mixto")
        )
      )
    ),
    h("button", {
      onClick: () => {
        if (!hForm.mes || !hForm.soja || !hForm.dolar) return;
        saveHist([...hist, { ...hForm, fecha: Date.now() }]);
        setHForm({ mes:"", soja:"", dolar:"", decision:"soja" });
      },
      style: { width:"100%", padding:10, background:"#3b5bdb", border:"none", borderRadius:9, color:"white", fontSize:13, fontWeight:700, cursor:"pointer", marginBottom:14 }
    }, "+ Agregar registro"),
    hist.length===0
      ? h("div", { style: { textAlign:"center", color:"#2e3650", fontSize:12, padding:"28px 16px", border:"1px dashed #1e2130", borderRadius:9 } }, "Sin registros todavía.")
      : h("div", { style: { overflowX:"auto" } },
          h("table", { style: { width:"100%", borderCollapse:"collapse", fontSize:12 } },
            h("thead", null, h("tr", null,
              ...["Mes","Soja","Dólar","Decisión",""].map((lbl,i) =>
                h("th", { key:i, style: { ...thS, textAlign: i===0?"left":"right" } }, lbl)
              )
            )),
            h("tbody", null,
              ...[...hist].reverse().map((row,ri) => {
                const realIdx = hist.length-1-ri;
                const bc = DC[row.decision]||DC.mixto;
                return h("tr", { key:ri },
                  h("td", { style: { padding:"8px", color:"#8a9ab8", borderBottom:"1px solid #141722" } }, row.mes),
                  h("td", { style: tdS }, "$"+FMT(row.soja)),
                  h("td", { style: tdS }, "$"+FMT(row.dolar)),
                  h("td", { style: { padding:"8px", borderBottom:"1px solid #141722" } },
                    h("span", { style: { display:"inline-block", padding:"2px 7px", borderRadius:4, fontSize:10, fontWeight:700, background:bc.bg, color:bc.col, border:`1px solid ${bc.brd}` } }, bc.lbl)
                  ),
                  h("td", { style: { padding:"8px", borderBottom:"1px solid #141722" } },
                    h("button", { onClick: () => saveHist(hist.filter((_,i) => i!==realIdx)),
                      style: { background:"none", border:"none", color:"#2e3650", cursor:"pointer", fontSize:14 } }, "✕")
                  )
                );
              })
            )
          )
        )
  );

  const HIST_SUBS = ["📦 Ventas", "📈 Precios", "✏️ Registros"];
  const tabHistorial = h("div", null,
    h("div", { style: { display:"flex", gap:5, marginBottom:14 } },
      ...HIST_SUBS.map((t,i) =>
        h("button", { key:i, onClick: () => setHistSub(i),
          style: { flex:1, padding:"7px 4px", borderRadius:7, border:`1px solid ${histSub===i?"#22c55e":"#1e2130"}`, background:histSub===i?"#0b1f11":"#141722", color:histSub===i?"#22c55e":"#4a5568", fontSize:10, fontWeight:600, cursor:"pointer" } },
          t
        )
      )
    ),
    histSub===0 ? subVentas : histSub===1 ? subPrecios : subRegistros
  );

  return h("div", { style: S.page },
    h("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 } },
      h("div", { style: { display:"flex", alignItems:"center", gap:10 } },
        h("span", { style: { fontSize:28 } }, "🌾"),
        h("div", null,
          h("div", { style: { fontSize:15, fontWeight:800, color:"#e8edf5", letterSpacing:"-0.01em" } }, "AGRO DASHBOARD"),
          h("div", { style: { fontSize:10, color:"#2e3650", marginTop:1 } }, "Soja vs Dólar · Decisión mensual")
        )
      ),
      h("span", { style: { fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3b5bdb", background:"#0e1225", border:"1px solid #1e2a50", borderRadius:5, padding:"3px 7px" } }, "DEMO")
    ),
    h("div", { style: { display:"flex", gap:6, marginBottom:16 } },
      ...TABS.map((t,i) =>
        h("button", { key:i, onClick: () => setTab(i),
          style: { flex:1, padding:"8px 4px", borderRadius:8, border:`1px solid ${tab===i?"#3b5bdb":"#1e2130"}`, background:tab===i?"#1a2040":"#141722", color:tab===i?"#7a9fff":"#4a5568", fontSize:11, fontWeight:600, cursor:"pointer" } },
          t
        )
      )
    ),
    tab===0 ? tabDecision : tab===1 ? tabSituacion : tabHistorial
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
